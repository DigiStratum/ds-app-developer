name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ds-core/**'
      - 'packages/ds-ui/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (ds-core or ds-ui)'
        required: true
        type: choice
        options:
          - ds-core
          - ds-ui

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ds-core: ${{ steps.changes.outputs.ds-core }}
      ds-ui: ${{ steps.changes.outputs.ds-ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - publish specified package
            if [ "${{ github.event.inputs.package }}" = "ds-core" ]; then
              echo "ds-core=true" >> $GITHUB_OUTPUT
              echo "ds-ui=false" >> $GITHUB_OUTPUT
            else
              echo "ds-core=false" >> $GITHUB_OUTPUT
              echo "ds-ui=true" >> $GITHUB_OUTPUT
            fi
          else
            # Push trigger - detect which packages changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            if echo "$CHANGED" | grep -q "^packages/ds-core/"; then
              echo "ds-core=true" >> $GITHUB_OUTPUT
            else
              echo "ds-core=false" >> $GITHUB_OUTPUT
            fi
            if echo "$CHANGED" | grep -q "^packages/ds-ui/"; then
              echo "ds-ui=true" >> $GITHUB_OUTPUT
            else
              echo "ds-ui=false" >> $GITHUB_OUTPUT
            fi
          fi

  publish-ds-core:
    needs: detect-changes
    if: needs.detect-changes.outputs.ds-core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@digistratum'

      - name: Get package version
        id: version
        working-directory: packages/ds-core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing @digistratum/ds-core@$VERSION"

      - name: Check if version exists
        id: check
        working-directory: packages/ds-core
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view @digistratum/ds-core@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists, skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not found, will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-core
        run: npm ci

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-core
        run: npm run build

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-core
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ds-ui:
    needs: detect-changes
    if: needs.detect-changes.outputs.ds-ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@digistratum'

      - name: Get package version
        id: version
        working-directory: packages/ds-ui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing @digistratum/ds-ui@$VERSION"

      - name: Check if version exists
        id: check
        working-directory: packages/ds-ui
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view @digistratum/ds-ui@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists, skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not found, will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-ui
        run: npm ci

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-ui
        run: npm run build

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ds-ui
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
