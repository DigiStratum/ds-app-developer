name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual triggering
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Build workspace packages
        run: npm run build -w @digistratum/ds-core -w @digistratum/layout

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ''

      - name: Run E2E tests
        run: npm run e2e:ci
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:4173
          # Run against preview server (built output)
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test artifacts (screenshots, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: frontend/test-results/
          retention-days: 7

  # Mobile E2E tests (Safari on iPhone)
  e2e-mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Build workspace packages
        run: npm run build -w @digistratum/ds-core -w @digistratum/layout

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (WebKit for Safari)
        run: npx playwright install --with-deps webkit
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ''

      - name: Run mobile E2E tests
        run: npx playwright test --project=mobile-safari --reporter=list,junit
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:4173
          CI: true

      - name: Upload mobile test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: frontend/playwright-report/
          retention-days: 30
