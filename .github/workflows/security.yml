name: Daily Security Scan

# Run security scans on a daily schedule instead of per-push to reduce CI compute costs
# Vulnerabilities rarely appear between pushes, so daily scanning is sufficient
# Manual trigger available for on-demand scans when needed

on:
  schedule:
    # Run daily at 6:00 AM UTC (low traffic time)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger for on-demand security scans

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

permissions:
  contents: read
  actions: read           # For CodeQL to read workflow runs
  security-events: write  # For CodeQL to upload results

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # CodeQL may fail on permissions issues in some repo configurations
    # Make it non-blocking so security scan doesn't fail on these issues
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Go vulnerability check
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Note: govulncheck may report stdlib vulns that require Go version bump
          # Making non-blocking for now; track vulns separately
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities - review required"

      # Node dependency audit
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: NPM Audit (Frontend)
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high || true

      - name: NPM Audit (CDK)  
        working-directory: cdk
        run: |
          npm install
          npm audit --audit-level=high || true

      # CodeQL Analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go, javascript
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go,javascript"

      - name: Security Scan Summary
        run: |
          echo "::notice::Daily security scan completed"
          echo "::notice::- Go vulnerability check: govulncheck"
          echo "::notice::- Node dependency audit: npm audit (frontend + cdk)"
          echo "::notice::- Static analysis: CodeQL (go + javascript)"
          echo "::notice::Review any warnings or failures above"