name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

permissions:
  contents: read
  actions: read           # For CodeQL to read workflow runs
  security-events: write  # For CodeQL to upload results

jobs:
  # ============================================================
  # Backend Lint & Test
  # ============================================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boilerplate/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: boilerplate/backend
          version: latest

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boilerplate/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v /test/integration)

      - name: Check coverage threshold (NFR-TEST-001 - target 80 percent)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          # NOTE: Threshold set to 45% as of 2026-03-05.
          # Issue #1107 progress: 31.9% -> 45% (session, dsauth, featureflags tests added)
          # Remaining gap: components (3.1%), featureflags store (requires DynamoDB infrastructure tests)
          if (( $(echo "$COVERAGE < 45" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 45% threshold"
            exit 1
          fi
          echo "::notice::Coverage ${COVERAGE}% meets minimum threshold (target: 80%)"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: boilerplate/backend/coverage.out

  # ============================================================
  # Frontend Lint & Test (boilerplate template)
  # ============================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core, layout)
        run: |
          # Build ds-core first (layout depends on it)
          cd packages/ds-core && npm install && npm run build && cd ../..
          # Build layout 
          cd packages/layout && npm install && npm run build && cd ../..

      - name: Install frontend with local packages
        working-directory: boilerplate/frontend
        run: |
          # Update package.json to use local packages
          npm pkg set dependencies.@digistratum/ds-core=file:../../packages/ds-core
          npm pkg set dependencies.@digistratum/layout=file:../../packages/layout
          npm install

      - name: Run ESLint
        run: npm run lint
        working-directory: boilerplate/frontend

      - name: Run TypeScript type check
        run: npm run type-check || npx tsc --noEmit
        working-directory: boilerplate/frontend

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core, layout)
        run: |
          cd packages/ds-core && npm install && npm run build && cd ../..
          cd packages/layout && npm install && npm run build && cd ../..

      - name: Install frontend with local packages
        working-directory: boilerplate/frontend
        run: |
          npm pkg set dependencies.@digistratum/ds-core=file:../../packages/ds-core
          npm pkg set dependencies.@digistratum/layout=file:../../packages/layout
          npm install

      - name: Run tests with coverage
        run: npm run test:coverage || npm test -- --coverage
        working-directory: boilerplate/frontend

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: boilerplate/frontend/coverage/

  # ============================================================
  # Developer Frontend Lint & Test (main frontend/)
  # ============================================================
  developer-frontend-lint:
    name: Developer Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core)
        run: |
          cd packages/ds-core && npm install && npm run build && cd ../..

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Run TypeScript type check
        run: npm run typecheck || npx tsc --noEmit
        working-directory: frontend

  developer-frontend-test:
    name: Developer Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core)
        run: |
          cd packages/ds-core && npm install && npm run build && cd ../..

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --run

      # NFR-TEST-001: Coverage thresholds are enforced in vitest config
      # Baseline (2026-03-05): statements 8.52%, branches 55.4%, functions 26.47%, lines 8.52%
      # Target: 70% lines/statements, 60% branches/functions
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-frontend-coverage
          path: frontend/coverage/

  # ============================================================
  # Security Scan
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # CodeQL may fail on permissions issues in some repo configurations
    # Make it non-blocking so CI doesn't fail on these issues
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Go vulnerability check
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        working-directory: boilerplate/backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Note: govulncheck may report stdlib vulns that require Go version bump
          # Making non-blocking for now; track vulns separately
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities - review required"

      # Node dependency audit
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: NPM Audit (Frontend)
        working-directory: boilerplate/frontend
        run: npm audit --audit-level=high || true

      - name: NPM Audit (Developer Frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: NPM Audit (CDK)
        working-directory: boilerplate/cdk
        run: npm audit --audit-level=high || true

      # CodeQL Analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go, javascript
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go,javascript"

  # ============================================================
  # Infrastructure Validation
  # ============================================================
  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: [build-backend]  # CDK synth needs backend binary
    defaults:
      run:
        working-directory: boilerplate/cdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: boilerplate/cdk/package-lock.json

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: boilerplate/backend/dist

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build CDK
        run: npm run build

      - name: CDK Synth (dry run)
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-west-2'

  # ============================================================
  # Build Artifacts
  # ============================================================
  build-backend:
    name: Build Backend
    needs: [backend-lint, backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Lambda binary (ARM64)
        working-directory: boilerplate/backend
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/bootstrap ./cmd/api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: boilerplate/backend/dist/bootstrap
          retention-days: 1

  build-frontend:
    name: Build Frontend
    needs: [frontend-lint, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core, layout)
        run: |
          cd packages/ds-core && npm install && npm run build && cd ../..
          cd packages/layout && npm install && npm run build && cd ../..

      - name: Install frontend with local packages
        working-directory: boilerplate/frontend
        run: |
          npm pkg set dependencies.@digistratum/ds-core=file:../../packages/ds-core
          npm pkg set dependencies.@digistratum/layout=file:../../packages/layout
          npm install

      - name: Build frontend
        working-directory: boilerplate/frontend
        run: npm run build
        env:
          VITE_API_URL: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: boilerplate/frontend/dist/
          retention-days: 1

  build-developer-frontend:
    name: Build Developer Frontend
    needs: [developer-frontend-lint, developer-frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ''

      - name: Build local packages (ds-core)
        run: |
          cd packages/ds-core && npm install && npm run build && cd ../..

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-frontend-build
          path: frontend/dist/
          retention-days: 1

  # ============================================================
  # CI Summary Gate
  # ============================================================
  ci-pass:
    name: CI Pass
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, developer-frontend-lint, developer-frontend-test, security-scan, cdk-synth, build-backend, build-frontend, build-developer-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-test.result }}" != "success" ]] || \
             [[ "${{ needs.developer-frontend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.developer-frontend-test.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.cdk-synth.result }}" != "success" ]] || \
             [[ "${{ needs.build-backend.result }}" != "success" ]] || \
             [[ "${{ needs.build-frontend.result }}" != "success" ]] || \
             [[ "${{ needs.build-developer-frontend.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "::notice::All CI checks passed ✓"
