name: Deploy (Canary)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-west-2
  AWS_ROLE_ARN: arn:aws:iam::171949636152:role/GitHubActionsCDKRole
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  CANARY_WEIGHT: 10  # 10% traffic to canary
  HEALTH_CHECK_DURATION_MINUTES: 5
  HEALTH_CHECK_INTERVAL_SECONDS: 30
  ERROR_RATE_THRESHOLD: 5  # 5% error rate triggers rollback
  LATENCY_THRESHOLD_MS: 1000  # p95 latency threshold

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================
  # Pre-flight Checks
  # ============================================================
  preflight:
    name: Pre-flight
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
    steps:
      - name: Check deployment conditions
        id: check
        run: |
          echo "CI workflow completed successfully"
          echo "should_deploy=true" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

  # ============================================================
  # Build Artifacts
  # ============================================================
  build:
    name: Build Artifacts
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build backend
        working-directory: backend
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/bootstrap ./cmd/api

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ''

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/dist/bootstrap

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ============================================================
  # Deploy Canary
  # ============================================================
  deploy-canary:
    name: Deploy Canary
    needs: [preflight, build]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      canary_version: ${{ steps.deploy.outputs.canary_version }}
      current_version: ${{ steps.deploy.outputs.current_version }}
      distribution_id: ${{ steps.deploy.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Store current Lambda version
        id: current
        run: |
          CURRENT_VERSION=$(aws lambda get-alias \
            --function-name {{LAMBDA_NAME}} \
            --name live \
            --query 'FunctionVersion' \
            --output text 2>/dev/null || echo "")
          if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" == "None" ]; then
            echo "No existing live alias found, this is initial deployment"
            echo "current_version=" >> $GITHUB_OUTPUT
          else
            echo "Current live version: $CURRENT_VERSION"
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Deploy CDK stack
        working-directory: cdk
        run: npx cdk deploy --all --require-approval never
        env:
          CANARY_DEPLOYMENT: 'true'

      - name: Inject secrets to Lambda
        run: |
          # Get secret from AWS Secrets Manager
          APP_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id ds-app-developer/dsaccount-app-secret \
            --query SecretString \
            --output text)
          
          # Get current env vars (CDK sets these)
          CURRENT_ENV=$(aws lambda get-function-configuration \
            --function-name {{LAMBDA_NAME}} \
            --query 'Environment.Variables' \
            --output json)
          
          # Merge with secret (jq adds/overwrites DSACCOUNT_APP_SECRET)
          UPDATED_ENV=$(echo "$CURRENT_ENV" | jq --arg secret "$APP_SECRET" '. + {DSACCOUNT_APP_SECRET: $secret}')
          
          # Update Lambda with merged env vars
          aws lambda update-function-configuration \
            --function-name {{LAMBDA_NAME}} \
            --environment "{\"Variables\": $UPDATED_ENV}"
          
          echo "::notice::Secrets injected to Lambda"
          
          # Wait for Lambda update to complete
          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated --function-name {{LAMBDA_NAME}}
          echo "Lambda update complete"

      - name: Publish new Lambda version
        id: deploy
        run: |
          # Publish new version
          NEW_VERSION=$(aws lambda publish-version \
            --function-name {{LAMBDA_NAME}} \
            --description "Canary deploy ${{ needs.preflight.outputs.commit_sha }}" \
            --query 'Version' \
            --output text)
          echo "Published Lambda version: $NEW_VERSION"
          echo "canary_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=${{ steps.current.outputs.current_version }}" >> $GITHUB_OUTPUT
          
          # Get CloudFront distribution ID
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@,'{{APP_DOMAIN}}')]].Id" \
            --output text)
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Configure Lambda alias with weighted routing
        run: |
          CANARY_VERSION="${{ steps.deploy.outputs.canary_version }}"
          CURRENT_VERSION="${{ steps.current.outputs.current_version }}"
          
          if [ -z "$CURRENT_VERSION" ]; then
            # Initial deployment: 100% to new version
            echo "Initial deployment - routing 100% to version $CANARY_VERSION"
            aws lambda update-alias \
              --function-name {{LAMBDA_NAME}} \
              --name live \
              --function-version $CANARY_VERSION \
              2>/dev/null || \
            aws lambda create-alias \
              --function-name {{LAMBDA_NAME}} \
              --name live \
              --function-version $CANARY_VERSION
          else
            # Canary deployment: split traffic
            CANARY_WEIGHT_DECIMAL=$(echo "scale=2; ${{ env.CANARY_WEIGHT }} / 100" | bc)
            echo "Canary deployment - routing ${CANARY_WEIGHT}% to version $CANARY_VERSION"
            aws lambda update-alias \
              --function-name {{LAMBDA_NAME}} \
              --name live \
              --function-version $CURRENT_VERSION \
              --routing-config "AdditionalVersionWeights={$CANARY_VERSION=$CANARY_WEIGHT_DECIMAL}"
          fi

      - name: Deploy frontend to canary path
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name {{CDK_STACK_NAME}} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          
          # Deploy to canary prefix for A/B testing
          aws s3 sync frontend/dist s3://$BUCKET/canary/ --delete
          
          echo "Frontend canary deployed to s3://$BUCKET/canary/"

  # ============================================================
  # Health Check & Canary Validation
  # ============================================================
  canary-validation:
    name: Canary Validation
    needs: deploy-canary
    runs-on: ubuntu-latest
    outputs:
      canary_healthy: ${{ steps.validation.outputs.healthy }}
      error_rate: ${{ steps.validation.outputs.error_rate }}
      p95_latency: ${{ steps.validation.outputs.p95_latency }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Wait for DNS propagation
        id: dns_check
        run: |
          echo "Checking DNS propagation for {{APP_DOMAIN}}..."
          MAX_ATTEMPTS=20
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            # Try to resolve the domain
            if host {{APP_DOMAIN}} > /dev/null 2>&1; then
              echo "✓ DNS resolved for {{APP_DOMAIN}}"
              
              # Verify we can reach the endpoint (not just DNS)
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 \
                https://{{APP_DOMAIN}}/api/health 2>/dev/null || echo "000")
              
              if [ "$HTTP_CODE" != "000" ]; then
                echo "✓ Endpoint reachable (HTTP $HTTP_CODE)"
                echo "dns_ready=true" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "DNS resolved but endpoint not reachable yet (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              fi
            else
              echo "DNS not propagated yet (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            fi
            
            sleep 15
          done
          
          echo "::warning::DNS propagation timeout - this may be an initial deployment"
          echo "dns_ready=false" >> $GITHUB_OUTPUT

      - name: Canary health checks        id: validation
        run: |
          echo "Starting canary validation for ${{ env.HEALTH_CHECK_DURATION_MINUTES }} minutes..."
          
          HEALTHY=true
          TOTAL_CHECKS=0
          FAILED_CHECKS=0
          LATENCIES=()
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + ${{ env.HEALTH_CHECK_DURATION_MINUTES }} * 60))
          
          while [ $(date +%s) -lt $END_TIME ]; do
            TOTAL_CHECKS=$((TOTAL_CHECKS + 1))
            
            # Health check with timing - uses /api/health endpoint
            RESPONSE=$(curl -s -w "\n%{http_code}\n%{time_total}" \
              -o /tmp/api/health_response.txt \
              https://{{APP_DOMAIN}}/api/health 2>/dev/null || echo "")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -2 | head -1)
            LATENCY_SEC=$(echo "$RESPONSE" | tail -1)
            LATENCY_MS=$(echo "$LATENCY_SEC * 1000" | bc | cut -d. -f1)
            
            if [ "$HTTP_CODE" != "200" ]; then
              FAILED_CHECKS=$((FAILED_CHECKS + 1))
              echo "::warning::Health check failed (HTTP $HTTP_CODE)"
            else
              LATENCIES+=($LATENCY_MS)
              echo "Health check passed (${LATENCY_MS}ms)"
            fi
            
            sleep ${{ env.HEALTH_CHECK_INTERVAL_SECONDS }}
          done
          
          # Calculate error rate
          if [ $TOTAL_CHECKS -gt 0 ]; then
            ERROR_RATE=$(echo "scale=2; $FAILED_CHECKS * 100 / $TOTAL_CHECKS" | bc)
          else
            ERROR_RATE=0
          fi
          echo "Error rate: ${ERROR_RATE}%"
          echo "error_rate=$ERROR_RATE" >> $GITHUB_OUTPUT
          
          # Calculate p95 latency
          if [ ${#LATENCIES[@]} -gt 0 ]; then
            # Sort latencies and get p95
            SORTED=($(printf '%s\n' "${LATENCIES[@]}" | sort -n))
            P95_INDEX=$(echo "${#SORTED[@]} * 95 / 100" | bc)
            P95_LATENCY=${SORTED[$P95_INDEX]}
          else
            P95_LATENCY=0
          fi
          echo "P95 latency: ${P95_LATENCY}ms"
          echo "p95_latency=$P95_LATENCY" >> $GITHUB_OUTPUT
          
          # Check thresholds
          if (( $(echo "$ERROR_RATE > ${{ env.ERROR_RATE_THRESHOLD }}" | bc -l) )); then
            echo "::error::Error rate ${ERROR_RATE}% exceeds threshold ${{ env.ERROR_RATE_THRESHOLD }}%"
            HEALTHY=false
          fi
          
          if [ $P95_LATENCY -gt ${{ env.LATENCY_THRESHOLD_MS }} ]; then
            echo "::error::P95 latency ${P95_LATENCY}ms exceeds threshold ${{ env.LATENCY_THRESHOLD_MS }}ms"
            HEALTHY=false
          fi
          
          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

      - name: Check CloudWatch metrics
        run: |
          # Get Lambda error metrics for canary version
          END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          START_TIME=$(date -u -d "-${{ env.HEALTH_CHECK_DURATION_MINUTES }} minutes" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || \
                       date -u -v-${{ env.HEALTH_CHECK_DURATION_MINUTES }}M +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get error count
          ERROR_COUNT=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions Name=FunctionName,Value={{LAMBDA_NAME}} \
            --start-time "$START_TIME" \
            --end-time "$END_TIME" \
            --period 300 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text 2>/dev/null || echo "0")
          
          # Get invocation count
          INVOCATION_COUNT=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Invocations \
            --dimensions Name=FunctionName,Value={{LAMBDA_NAME}} \
            --start-time "$START_TIME" \
            --end-time "$END_TIME" \
            --period 300 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text 2>/dev/null || echo "1")
          
          echo "Lambda errors: $ERROR_COUNT / $INVOCATION_COUNT invocations"
          
          if [ "$ERROR_COUNT" != "None" ] && [ "$ERROR_COUNT" != "" ]; then
            LAMBDA_ERROR_RATE=$(echo "scale=2; $ERROR_COUNT * 100 / $INVOCATION_COUNT" | bc 2>/dev/null || echo "0")
            echo "Lambda error rate: ${LAMBDA_ERROR_RATE}%"
            
            if (( $(echo "$LAMBDA_ERROR_RATE > ${{ env.ERROR_RATE_THRESHOLD }}" | bc -l 2>/dev/null || echo "0") )); then
              echo "::warning::Lambda error rate elevated: ${LAMBDA_ERROR_RATE}%"
            fi
          fi

      - name: Run E2E smoke tests
        id: e2e
        run: |
          echo "Running E2E smoke tests..."
          
          # If DNS wasn't ready, this is likely an initial deployment
          IS_INITIAL_DEPLOY="${{ steps.dns_check.outputs.dns_ready }}"
          if [ "$IS_INITIAL_DEPLOY" == "false" ]; then
            echo "::notice::Initial deployment detected - skipping health checks until DNS propagates"
            echo "e2e_passed=true" >> $GITHUB_OUTPUT
            echo "Skipping E2E tests for initial deployment"
            exit 0
          fi
          
          # Test health endpoint with retry
          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://{{APP_DOMAIN}}/api/health)
            if [ "$HEALTH_STATUS" == "200" ]; then
              break
            fi
            RETRY=$((RETRY + 1))
            echo "Health check attempt $RETRY failed (HTTP $HEALTH_STATUS), retrying..."
            sleep 5
          done
          
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "::error::Health endpoint returned $HEALTH_STATUS after $MAX_RETRIES attempts"
            echo "e2e_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✓ Health endpoint OK"
          
          # Test API endpoint (unauthenticated should return 401)
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://{{APP_DOMAIN}}/api/session)
          if [ "$API_STATUS" != "200" ] && [ "$API_STATUS" != "401" ]; then
            echo "::error::API endpoint returned unexpected status $API_STATUS"
            echo "e2e_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✓ API endpoint OK (status: $API_STATUS)"
          
          # Test frontend loads (from canary path during validation)
          # During canary phase, frontend is at /canary/ - root may be empty for initial deploys
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://{{APP_DOMAIN}}/canary/index.html)
          if [ "$FRONTEND_STATUS" != "200" ]; then
            echo "::warning::Frontend canary returned $FRONTEND_STATUS (may be initial deploy)"
            # Don't fail - frontend will be promoted after validation passes
          else
            echo "✓ Frontend canary OK"
          fi
          
          # Test frontend contains expected content
          FRONTEND_CONTENT=$(curl -s https://{{APP_DOMAIN}}/canary/index.html)
          if ! echo "$FRONTEND_CONTENT" | grep -q "<div id=\"root\">" 2>/dev/null; then
            echo "::warning::Frontend may not have loaded correctly"
          else
            echo "✓ Frontend content OK"
          fi
          
          echo "e2e_passed=true" >> $GITHUB_OUTPUT
          echo "All E2E smoke tests passed ✓"

  # ============================================================
  # Promote or Rollback
  # ============================================================
  promote-canary:
    name: Promote Canary
    needs: [deploy-canary, canary-validation]
    if: needs.canary-validation.outputs.canary_healthy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Promote canary to 100%
        run: |
          CANARY_VERSION="${{ needs.deploy-canary.outputs.canary_version }}"
          echo "Promoting canary version $CANARY_VERSION to 100% traffic"
          
          aws lambda update-alias \
            --function-name {{LAMBDA_NAME}} \
            --name live \
            --function-version $CANARY_VERSION \
            --routing-config 'AdditionalVersionWeights={}'
          
          echo "::notice::Canary promoted successfully"

      - name: Promote frontend
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name {{CDK_STACK_NAME}} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          
          # Copy canary to production root (no --delete to preserve canary folder)
          aws s3 cp s3://$BUCKET/canary/ s3://$BUCKET/ --recursive
          
          echo "Frontend promoted from canary/"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ needs.deploy-canary.outputs.distribution_id }}"
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"
          echo "CloudFront cache invalidated"

      - name: Create deployment record
        run: |
          echo "Deployment successful"
          echo "  - Version: ${{ needs.deploy-canary.outputs.canary_version }}"
          echo "  - Error Rate: ${{ needs.canary-validation.outputs.error_rate }}%"
          echo "  - P95 Latency: ${{ needs.canary-validation.outputs.p95_latency }}ms"

      - uses: actions/checkout@v4

      - name: Register manifest with DSAccount
        continue-on-error: true  # Non-blocking: manifest registration is optional
        run: |
          # Skip if register-manifest.sh doesn't exist (boilerplate apps may not have it)
          if [ ! -f "./scripts/register-manifest.sh" ]; then
            echo "::notice::scripts/register-manifest.sh not found - skipping manifest registration"
            echo "To enable, copy register-manifest.sh from ds-app-developer and add manifest.json"
            exit 0
          fi
          
          # Get app secret from Secrets Manager
          APP_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id ds-app-developer/dsaccount-app-secret \
            --query SecretString \
            --output text)
          
          # Get version from package.json
          APP_VERSION=$(jq -r '.version' package.json)
          
          # Run registration script
          chmod +x ./scripts/register-manifest.sh
          ./scripts/register-manifest.sh
        env:
          DSACCOUNT_URL: https://account.digistratum.com
          DSACCOUNT_APP_ID: ${{ secrets.DSACCOUNT_APP_ID || 'developer' }}
          DSACCOUNT_APP_SECRET_ARN: ds-app-developer/dsaccount-app-secret
          HEALTH_CHECK_URL: https://{{APP_DOMAIN}}/api/health
          CDK_STACK_NAME: {{CDK_STACK_NAME}}

  rollback:
    name: Rollback
    needs: [deploy-canary, canary-validation]
    if: needs.canary-validation.outputs.canary_healthy == 'false' && needs.deploy-canary.outputs.current_version != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback Lambda to previous version
        run: |
          CURRENT_VERSION="${{ needs.deploy-canary.outputs.current_version }}"
          
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::No previous version to rollback to!"
            exit 1
          fi
          
          echo "Rolling back to version $CURRENT_VERSION"
          
          aws lambda update-alias \
            --function-name {{LAMBDA_NAME}} \
            --name live \
            --function-version $CURRENT_VERSION \
            --routing-config 'AdditionalVersionWeights={}'
          
          echo "::warning::Rolled back to version $CURRENT_VERSION"

      - name: Clean up canary frontend
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name {{CDK_STACK_NAME}} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          
          aws s3 rm s3://$BUCKET/canary/ --recursive
          echo "Canary frontend cleaned up"

      - name: Report rollback
        run: |
          echo "::error::Deployment rolled back due to canary validation failure"
          echo "  - Error Rate: ${{ needs.canary-validation.outputs.error_rate }}%"
          echo "  - P95 Latency: ${{ needs.canary-validation.outputs.p95_latency }}ms"
          echo "  - Rolled back to version: ${{ needs.deploy-canary.outputs.current_version }}"
