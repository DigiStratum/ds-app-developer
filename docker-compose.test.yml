# Docker Compose for Test Dependencies
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d    # Start dependencies
#   docker-compose -f docker-compose.test.yml down     # Stop and cleanup
#
# DynamoDB Local runs on port 8000
# Set DYNAMODB_ENDPOINT=http://localhost:8000 for tests

version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ds-app-skeleton-dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
    # No volume - inMemory mode for fast tests
    # Add volume if you need persistence:
    # volumes:
    #   - dynamodb_data:/home/dynamodblocal/data
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

# Uncomment for persistent storage:
# volumes:
#   dynamodb_data:
